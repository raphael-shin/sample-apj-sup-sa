[server]
headless = true
enableCORS = false
enableXsrfProtection = false
enableWebsocketCompression = false
port = 8501

[theme]
base = "dark"
primaryColor = "#7dd3fc"
backgroundColor = "#0b0f14"
secondaryBackgroundColor = "#11161d"
textColor = "#d4d8dd"
font = "monospace"

[client]
toolbarMode = "minimal"
showSidebarNavigation = false
